<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Puissance 4 - Menu</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Puissance 4</h1>
    <form method="POST" action="/">
        <label>
            <input type="radio" name="mode" value="pvp" checked> Joueur vs Joueur
        </label>
        <label>
            <input type="radio" name="mode" value="solo"> Joueur vs Ordinateur
        </label>

        <label>Nom Joueur 1 :</label>
        <input type="text" name="player1" value="{{.PlayerValue1}}" required><br>

        <label>Couleur :</label>
        <select name="color1">
            <option value="red">Rouge</option>
            <option value="yellow">Jaune</option>
        </select><br><br>

        <label>Nom Joueur 2 :</label>
        <input type="text" name="player2" value="{{.PlayerValue2}}" required><br>

        <label>Couleur :</label>
        <select name="color2">
            <option value="red">Rouge</option>
            <option value="yellow">Jaune</option>
        </select><br><br>

        <button type="submit">Valider</button>
    </form>

    {{if .Message}}
    <p class="error">{{.Message}}</p>
    {{end}}
</body>
</html>
